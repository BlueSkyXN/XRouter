name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go / lint, test, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.mod
      - name: Format check
        run: |
          files="$(gofmt -l ./*.go)"
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi
      - name: Vet
        run: make vet
      - name: Test
        run: make test
      - name: Build
        run: make build VERSION=ci-${{ github.sha }} COMMIT=${{ github.sha }}
      - name: Version smoke
        run: ./dist/xrouter -version
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xrouter-linux-amd64
          path: dist/xrouter
          if-no-files-found: error
