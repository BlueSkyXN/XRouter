name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    name: GitHub Actions / actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.mod
      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
      - name: Run actionlint
        run: |
          actionlint_bin="$(go env GOPATH)/bin/actionlint"
          "$actionlint_bin"

  docs:
    name: Docs / examples contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check docs and examples
        run: scripts/check-docs.sh

  go:
    name: Go / lint, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.mod
      - name: Format check
        run: |
          files="$(gofmt -l ./*.go)"
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi
      - name: Vet
        run: make vet
      - name: Test
        run: make test
      - name: Build
        run: make build VERSION=ci-${{ github.sha }} COMMIT=${{ github.sha }}
      - name: Version smoke
        run: ./dist/xrouter -version
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xrouter-linux-amd64
          path: dist/xrouter
          if-no-files-found: error

  race:
    name: Go / race tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.mod
      - name: Race tests
        run: go test -race -count=1 ./...

  smoke:
    name: Local / non-live smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.mod
      - name: Build
        run: make build VERSION=ci-${{ github.sha }} COMMIT=${{ github.sha }} DATE=ci
      - name: Smoke local gateway
        run: scripts/smoke-local.sh

  package:
    name: Release snapshot / packages
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.mod
      - name: Build release snapshot
        run: make release-snapshot VERSION=v0.0.0-ci COMMIT=${{ github.sha }} DATE=ci
      - name: Upload package snapshot
        uses: actions/upload-artifact@v4
        with:
          name: xrouter-release-snapshot
          path: |
            dist/packages/*.tar.gz
            dist/packages/*.zip
            dist/packages/SHA256SUMS
          if-no-files-found: error

  container:
    name: Docker / build
    needs: go
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          build-args: |
            VERSION=ci-${{ github.sha }}
            COMMIT=${{ github.sha }}
            DATE=ci
